# Cloudflare Pages config for the karte.cc landing-astro project.
#
# This is a pure-static deploy (output: "static" in astro.config.mjs).
# `wrangler pages deploy` and the Cloudflare dashboard both pick this
# file up to find the build output. No Workers runtime needed.
name = "linkchat-landing"
compatibility_date = "2026-06-04"
pages_build_output_dir = "dist"
