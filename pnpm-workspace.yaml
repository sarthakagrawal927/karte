packages:
  - "."
  - "landing-astro"

# Pin packages that were published in the last 24h so the
# supply-chain policy on `pnpm install --frozen-lockfile` doesn't
# reject the lockfile. Bump these as they age past the cutoff.
overrides:
  rollup: 4.60.2
  wrangler: 4.85.0
  miniflare: 4.20260601.0
  "@types/node": "24.12.4"
