name: Deploy to Cloudflare Workers
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy.yml'
      - 'migrations/**'
      - 'public/**'
      - 'src/**'
      - 'drizzle.config.ts'
      - 'eslint.config.js'
      - 'eslint.config.mjs'
      - 'next.config.ts'
      - 'open-next.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'postcss.config.mjs'
      - 'tsconfig.json'
      - 'wrangler.jsonc'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with: { version: latest }
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: pnpm }
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm cf:build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          command: deploy
      - name: Smoke check production worker
        run: curl --fail --silent --show-error --location --max-time 30 https://linkchat.sarthakagrawal927.workers.dev >/dev/null
