name: Deploy to Cloudflare Workers
# Rollback: `wrangler versions rollback` from the repo root, or via
# dash.cloudflare.com → Workers → linkchat → Versions → "Rollback".
on:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: pnpm }
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm cf:build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
      - name: Smoke check production worker
        run: curl --fail --silent --show-error --location --retry 3 --retry-delay 5 --max-time 30 https://linkchat.sarthakagrawal927.workers.dev >/dev/null
