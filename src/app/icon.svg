<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6e5b8"/>
      <stop offset="55%" stop-color="#c4a46b"/>
      <stop offset="100%" stop-color="#8a6b34"/>
    </linearGradient>
    <linearGradient id="foilEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(196,164,107,0.55)"/>
      <stop offset="30%" stop-color="rgba(255,225,170,0.06)"/>
      <stop offset="70%" stop-color="rgba(255,225,170,0.06)"/>
      <stop offset="100%" stop-color="rgba(196,164,107,0.55)"/>
    </linearGradient>
  </defs>
  <!-- Card base — warm near-black like the deck bg -->
  <rect width="32" height="32" rx="6" fill="#0a0805"/>
  <!-- Inner foil hairline edge (echoes the cards' foil border) -->
  <rect x="2.5" y="2.5" width="27" height="27" rx="4"
        fill="none" stroke="url(#foilEdge)" stroke-width="0.6"/>
  <!-- Gold diamond — the recurring mark on every card corner -->
  <path d="M16 7 L25 16 L16 25 L7 16 Z" fill="url(#gold)"/>
</svg>
